<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>djMusic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header>
    <h1>djMusic</h1>
    <div id="status">Cliquez pour activer le son</div>
  </header>

  <!-- Tabs instruments -->
  <div id="instrument-tabs">
    <button class="tab active" data-instr="synth">Synth</button>
    <button class="tab" data-instr="basse">Basse</button>
    <button class="tab" data-instr="guitare">Guitare</button>
    <button class="tab" data-instr="drums">Drums</button>
  </div>

  <!-- Panneaux instrument + effets -->
  <div id="main-panel">

    <!-- ── Synth ── -->
    <div id="panel-synth" class="instr-panel active">
      <div class="panel-title">Synthétiseur</div>
      <div class="param-row">
        <label>Oscillateur</label>
        <div id="osc-buttons">
          <button class="osc-btn active" data-type="sine">Sine</button>
          <button class="osc-btn" data-type="square">Square</button>
          <button class="osc-btn" data-type="sawtooth">Saw</button>
          <button class="osc-btn" data-type="triangle">Tri</button>
        </div>
      </div>
      <div class="param-row">
        <label>Attack <span id="synth-atk-val">10ms</span></label>
        <input type="range" id="synth-attack" min="1" max="500" value="10">
      </div>
      <div class="param-row">
        <label>Release <span id="synth-rel-val">150ms</span></label>
        <input type="range" id="synth-release" min="20" max="2000" value="150">
      </div>
    </div>

    <!-- ── Basse ── -->
    <div id="panel-basse" class="instr-panel">
      <div class="panel-title">Basse</div>
      <div class="param-row">
        <label>Forme d'onde</label>
        <div id="bass-osc-buttons">
          <button class="osc-btn active" data-type="sawtooth">Saw</button>
          <button class="osc-btn" data-type="square">Square</button>
        </div>
      </div>
      <div class="param-row">
        <label>Cutoff basse <span id="bass-cutoff-val">300Hz</span></label>
        <input type="range" id="bass-cutoff" min="50" max="2000" value="300">
      </div>
      <div class="param-row">
        <label>Sub-oscilateur</label>
        <label class="toggle">
          <input type="checkbox" id="bass-sub" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="param-row">
        <label>Release <span id="bass-rel-val">300ms</span></label>
        <input type="range" id="bass-release" min="50" max="3000" value="300">
      </div>
    </div>

    <!-- ── Guitare ── -->
    <div id="panel-guitare" class="instr-panel">
      <div class="panel-title">Guitare (Karplus-Strong)</div>
      <div class="param-row">
        <label>Brillance <span id="gtr-bright-val">3500Hz</span></label>
        <input type="range" id="gtr-brightness" min="500" max="12000" value="3500">
      </div>
      <div class="param-row">
        <label>Sustain <span id="gtr-sustain-val">0.97</span></label>
        <input type="range" id="gtr-sustain" min="80" max="99" value="97">
      </div>
      <div class="param-row">
        <label>Corps <span id="gtr-body-val">0%</span></label>
        <input type="range" id="gtr-body" min="0" max="100" value="0">
      </div>
    </div>

    <!-- ── Drums ── -->
    <div id="panel-drums" class="instr-panel">
      <div class="panel-title">Drums <span class="hint">(clic souris ou touches ci-dessous)</span></div>
      <div id="drum-pads"></div>
    </div>

    <!-- ── Effets partagés ── -->
    <div id="effects-panel">
      <div class="panel-title">Effets</div>
      <div class="fx-grid">
        <div class="param-row">
          <label>Volume <span id="vol-val">80%</span></label>
          <input type="range" id="volume" min="0" max="100" value="80">
        </div>
        <div class="param-row">
          <label>Filtre <span id="filter-val">8000Hz</span></label>
          <input type="range" id="filter-cutoff" min="100" max="16000" value="8000">
        </div>
        <div class="param-row">
          <label>Résonance <span id="res-val">1.0</span></label>
          <input type="range" id="filter-res" min="1" max="20" value="1" step="0.5">
        </div>
        <div class="param-row">
          <label>Distortion <span id="dist-val">0%</span></label>
          <input type="range" id="distortion" min="0" max="100" value="0">
        </div>
        <div class="param-row">
          <label>Reverb <span id="rev-val">0%</span></label>
          <input type="range" id="reverb" min="0" max="100" value="0">
        </div>
        <div class="param-row">
          <label>Delay <span id="delay-val">0%</span></label>
          <input type="range" id="delay-wet" min="0" max="80" value="0">
        </div>
        <div class="param-row">
          <label>Delay temps <span id="delay-time-val">300ms</span></label>
          <input type="range" id="delay-time" min="50" max="1000" value="300">
        </div>
        <div class="param-row">
          <label>Delay feedback <span id="delay-fb-val">30%</span></label>
          <input type="range" id="delay-feedback" min="0" max="85" value="30">
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SÉQUENCEUR ═══ -->
  <section id="sequencer">

    <div id="seq-transport">
      <div id="seq-btns">
        <button id="btn-stop"   class="seq-btn" title="Stop">⏹</button>
        <button id="btn-record" class="seq-btn seq-btn-rec" title="Enregistrer">⏺</button>
        <button id="btn-play"   class="seq-btn" title="Lire">▶</button>
      </div>
      <label class="seq-ctrl">BPM
        <input type="number" id="seq-bpm" value="120" min="40" max="240">
      </label>
      <label class="seq-ctrl">Mesures
        <select id="seq-bars">
          <option value="2">2</option>
          <option value="4" selected>4</option>
          <option value="8">8</option>
          <option value="16">16</option>
        </select>
      </label>
      <div id="seq-pos">1 : 1</div>
      <button id="btn-add-track" class="seq-btn-sm">+ Piste</button>
    </div>

    <div id="seq-body">
      <div id="seq-track-list"></div>
      <div id="seq-canvas-area"></div>
    </div>

  </section>

  <!-- Clavier -->
  <div id="keyboard-wrap">
    <div id="keyboard-controls">
      <span>Octave</span>
      <button id="oct-down">−</button>
      <span id="oct-val">4</span>
      <button id="oct-up">+</button>
    </div>
    <div id="keyboard">
      <div class="keys" id="keys"></div>
    </div>
  </div>

  <!-- ═══ STEMS ═══ -->
  <section id="stems-section">
    <div id="stems-header">
      <div class="panel-title">Séparation de stems</div>
      <div id="stems-controls">
        <div id="stem-dropzone" title="Cliquez ou déposez un fichier MP3">
          <span id="stem-drop-label">📂 Déposez un MP3 ici ou cliquez</span>
          <input type="file" id="stem-file" accept="audio/*" hidden>
        </div>
        <label class="seq-ctrl">Modèle
          <select id="stem-model">
            <option value="htdemucs">htdemucs (4 stems)</option>
            <option value="htdemucs_6s">htdemucs_6s (6 stems)</option>
          </select>
        </label>
        <button id="stem-btn" class="seq-btn-sm">Séparer</button>
        <span id="stem-status" class="stem-status-text"></span>
      </div>
    </div>
    <div id="stem-tracks"></div>
  </section>

  <!-- Visualizer -->
  <div id="visualizer-wrap">
    <canvas id="visualizer"></canvas>
  </div>

</div>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="sequencer.js"></script>
<script src="stems.js"></script>
</body>
</html>
